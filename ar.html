<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELO - السرعة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="لوجو.png">
</head>
<body>

    <header class="main-header">
        <a href="ar.html" class="header-logo">VELO<span>.</span></a>
        <nav class="nav-links">
            <a href="ar.html" class="active">السرعة</a>
            <a href="translate.html">الترجمة</a>
            <a href="compress_ar.html">الضغط</a>
            <a href="index.html">الرئيسية</a>
        </nav>
        <a href="en.html" class="header-lang-btn">English</a>
    </header>

    <div class="main-wrapper">
        <p class="brand-sub">تعديل سرعة ملفاتك الصوتية وتنزيلها فوراً</p>
        <div class="logo-container">
            <div class="logo-wrapper">
        <!-- تأكد من وضع مسار الصورة الصحيح للوجو الخاص بك هنا -->
                <img src="لوجو.png" alt="VELO Logo" class="logo-img">
            </div>
        </div>

        <div class="audio-card">
            <h2>⚡ التحكم في سرعة الصوت</h2>
            
            <label for="audio-upload" class="dropzone" id="dropzone">
                <span style="font-size: 24px; display: block;">🎵</span>
                <p>اسحب وأفلت الملف الصوتي هنا أو <strong>اضغط للتصفح</strong></p>
                <div id="file-name" class="file-name"></div>
            </label>
            <input type="file" id="audio-upload" accept="audio/*">

            <audio id="main-audio"></audio>

            <div class="custom-player" id="player-container" style="display: none;">
                <div class="playback-row">
                    <button class="play-pause-btn" id="play-btn">▶</button>
                </div>

                <div class="progress-container">
                    <span class="time-display" id="current-time">00:00</span>
                    <div class="custom-progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="time-display" id="duration">00:00</span>
                </div>

                <div class="speed-wrapper">
                    <div class="speed-label-row">
                        <span>سرعة التشغيل</span>
                        <span><span id="speed-val">1.0</span>x</span>
                    </div>
                    <input type="range" id="speed-slider" class="custom-slider" min="0.5" max="2.0" step="0.1" value="1">
                    
                    <div class="quick-speeds">
                        <button class="speed-opt" data-speed="0.5">0.5x</button>
                        <button class="speed-opt active" data-speed="1.0">1.0x</button>
                        <button class="speed-opt" data-speed="1.5">1.5x</button>
                        <button class="speed-opt" data-speed="2.0">2.0x</button>
                    </div>
                </div>

                <button class="action-btn download-btn" id="download-btn">💾 تحميل الملف الصوتي المعدل</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
